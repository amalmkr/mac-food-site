    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
      .bgd{
        background-color: rgb(213, 63, 63);
      }
      #Snav{
        background-color: rgb(213,63,63);
      }
      
      input[type="radio"]{
        display: none;
      }
      
      .title-line{
        width: 60px;
        height: 3px;
        background: #dc3545;
        transition:transform 0.4s ease-in-out;
      }
      
      .title-line:hover{
        transform: scale(1.5);
      }

      .category-button{
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 28px;
        background: #fff;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 500;
        box-shadow: 0 0 0 1px #eee;
        transition: 0.3s;
      }

      .category-button i{
        font-size: 22px;
        color: #dc3545;
      }

      .category-button:hover{
        background: #ffc107;
      }

      
    
      </style>
  </head>

      <ul class="list-unstyled">

<div class="container text-center radio-btn-bg w-100 h-75">
  <h2 class="mt-5">Today Special</h2>
  <div class="text-line mx-auto "></div>

  <!--radio-->
  <input type="radio" name="food" id="all" checked>
  <input type="radio" name="food" id="pizza">
  <input type="radio" name="food" id="burger">
  <input type="radio" name="food" id="icecream"
  <input type="radio" name="food" id="chicken"

  <!--buttons-->
  <div class="btn-area d-flex justify-content-center gap-4 flex-wrap mb-5 mt-5">
    <label for="pizza" class="category-button">
      <i class="fa-solid fa-pizza-slice"></i>PIZZA
    </label>
    <label for="burger" class="category-button">
      <i class="fa-solid fa-burger"></i>BURGER
    </label>
    <label for="icecream" class="category-button">
      <i class="fa-solid fa-ice-cream"></i>ICE CREAM
    </label>
    <label for="chicken" class="category-button">
      <i class="fa-solid fa-drumstick-bite"></i>CHICKEN
    </label>
  </div>
